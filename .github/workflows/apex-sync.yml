name: Apex Sync

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: apex-deploy-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  NODE_VERSION: "24"
  VITE_APEX_BUILD_MARKER: "github-${{ github.sha }}"
  APEX_BUILD_MARKER: "github-${{ github.sha }}"
  GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
  GH_TOKEN: ${{ github.token }}

jobs:
  validate:
    name: Validate build and Apex checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout exact commit
        uses: actions/checkout@v4

      - name: Show commit proof
        run: |
          echo "GITHUB_SHA=${GITHUB_SHA}"
          echo "GITHUB_REF=${GITHUB_REF}"
          echo "GITHUB_HEAD_REF=${GITHUB_HEAD_REF}"
          echo "GITHUB_BASE_REF=${GITHUB_BASE_REF}"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build
        run: |
          set -o pipefail
          npm run build 2>&1 | tee action_error.log || node scripts/ci-auto-fix.mjs "npm run build" action_error.log

      - name: Tests
        run: |
          set -o pipefail
          npm run test 2>&1 | tee action_error.log || node scripts/ci-auto-fix.mjs "npm run test" action_error.log

      - name: Validate H5
        run: |
          set -o pipefail
          npm run validate:cp15x-h5 2>&1 | tee action_error.log || node scripts/ci-auto-fix.mjs "npm run validate:cp15x-h5" action_error.log

      - name: Validate H44
        run: |
          set -o pipefail
          npm run validate:cp15x-h44 2>&1 | tee action_error.log || node scripts/ci-auto-fix.mjs "npm run validate:cp15x-h44" action_error.log

      - name: Validate DirectCut pipeline
        run: |
          set -o pipefail
          npm run validate:directcut-pipeline 2>&1 | tee action_error.log || node scripts/ci-auto-fix.mjs "npm run validate:directcut-pipeline" action_error.log
        env:
          DIRECTCUT_ENABLE_FULL: "true"
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FAL_KEY: ${{ secrets.FAL_KEY }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}

      - name: Validate Docs Live Status (Regra Absoluta 6)
        run: |
          set -o pipefail
          npm run validate:docs-live 2>&1 | tee action_error.log || node scripts/ci-auto-fix.mjs "npm run validate:docs-live" action_error.log



  supabase-production:
    name: Apply Supabase migrations on base branch only
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout exact commit
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        run: supabase link --project-ref "${{ secrets.SUPABASE_PROJECT_REF }}"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

      - name: Apply migrations
        run: supabase db push --include-all
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}



  electron-production:
    name: Build and Release Windows EXE
    runs-on: windows-latest
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write

    steps:
      - name: Checkout exact commit
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build and Publish Electron
        run: npm run electron:build -- --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

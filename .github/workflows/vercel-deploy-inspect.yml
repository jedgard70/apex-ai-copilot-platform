name: Vercel Deploy Inspect

on:
  workflow_dispatch: {}
  push:
    branches: [ main ]

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch recent Vercel deployments
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          if [ -z "${VERCEL_TOKEN}" ] || [ -z "${VERCEL_PROJECT_ID}" ]; then
            echo "Missing Vercel secrets. Set VERCEL_TOKEN and VERCEL_PROJECT_ID in repo secrets."; exit 1
          fi
          echo "Fetching deployments for project $VERCEL_PROJECT_ID"
          curl -s -H "Authorization: Bearer $VERCEL_TOKEN" "https://api.vercel.com/v6/deployments?projectId=${VERCEL_PROJECT_ID}&limit=10" > deployments.json
          cat deployments.json

      - name: Extract latest deployment id
        id: get_deploy
        run: |
          DEPLOY_ID=$(jq -r '.deployments[0].uid // .deployments[0].id' deployments.json)
          echo "deployment_id=$DEPLOY_ID" >> $GITHUB_OUTPUT

      - name: Fetch deployment events/logs
        if: steps.get_deploy.outputs.deployment_id != ''
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          DEPLOY_ID=${{ steps.get_deploy.outputs.deployment_id }}
          echo "Fetching events for deployment $DEPLOY_ID"
          curl -s -H "Authorization: Bearer $VERCEL_TOKEN" "https://api.vercel.com/v2/now/deployments/$DEPLOY_ID/events" > deployment-events.json || true
          curl -s -H "Authorization: Bearer $VERCEL_TOKEN" "https://api.vercel.com/v1/now/deployments/$DEPLOY_ID/aliases" > deployment-aliases.json || true
          ls -lah

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vercel-deploy-inspect
          path: |
            deployments.json
            deployment-events.json
            deployment-aliases.json

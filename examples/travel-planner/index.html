<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Travel Planner</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <header>
      <h1>AI Travel Planner</h1>
      <div id="auth-area">
        <button id="login-btn" class="btn btn-primary">Sign in with Google</button>
        <div id="user-info" class="hidden">
          <img id="user-avatar" alt="avatar" />
          <span id="user-name"></span>
          <button id="logout-btn" class="btn btn-outline">Sign out</button>
        </div>
      </div>
    </header>

    <main id="main-content" class="hidden">
      <section id="new-trip">
        <h2>Plan a New Trip</h2>
        <form id="trip-form">
          <input type="text" id="destination" placeholder="Destination (e.g. Paris, France)" required />
          <div class="row">
            <input type="date" id="start-date" required />
            <input type="date" id="end-date" required />
          </div>
          <div class="row">
            <select id="budget">
              <option value="budget">Budget</option>
              <option value="mid" selected>Mid-range</option>
              <option value="luxury">Luxury</option>
            </select>
            <select id="interests">
              <option value="culture">Culture & History</option>
              <option value="nature" selected>Nature & Adventure</option>
              <option value="food">Food & Culinary</option>
              <option value="relaxation">Relaxation</option>
            </select>
          </div>
          <div class="row">
            <input type="file" id="photo-input" accept="image/*" />
            <label for="photo-input" class="btn btn-outline">Upload reference photo</label>
          </div>
          <button type="submit" id="generate-btn" class="btn btn-primary btn-block">
            Generate AI Itinerary
          </button>
        </form>
      </section>

      <section id="itinerary-result" class="hidden">
        <h2>Your AI Itinerary</h2>
        <div id="itinerary-content"></div>
        <button id="save-trip-btn" class="btn btn-primary">Save Trip</button>
      </section>

      <section id="saved-trips">
        <h2>Saved Trips</h2>
        <div id="trips-list"></div>
      </section>
    </main>

    <div id="loading" class="hidden">
      <div class="spinner"></div>
      <p>Planning your trip with AI...</p>
    </div>
  </div>

  <script type="importmap">
  {
    "imports": {
      "firebase/app": "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js",
      "firebase/auth": "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js",
      "firebase/firestore": "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js",
      "firebase/ai": "https://www.gstatic.com/firebasejs/11.0.1/firebase-ai.js"
    }
  }
  </script>
  <script type="module" src="app.js"></script>
</body>
</html>
